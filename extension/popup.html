<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Piper Read Aloud</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <p class="hint">
        Normal pages: select text, then Read.<br />
        PDFs: select text, Ctrl+C, then Read (clipboard fallback).
      </p>
      <button id="read" type="button">Read selection or clipboard</button>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
